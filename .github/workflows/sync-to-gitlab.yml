name: Sync to GitLab

on:
  push:
    branches: '**'
  pull_request:
    branches: '**'
  workflow_dispatch:

jobs:
  push-to-gitlab:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all branches
        run: |
          git fetch origin '+refs/heads/*:refs/remotes/origin/*'

      - name: Set remote repository
        env:
          gitlab_url: ${{ secrets.LABSSAFY_URL }}
          gitlab_token_name: ${{ secrets.LABSSAFY_TOKEN_NAME }}
          gitlab_token: ${{ secrets.LABSSAFY_TOKEN }}
        run: |
          git remote add gitlab https://${gitlab_token_name}:${gitlab_token}@${gitlab_url#https://};

      - name: Force push everything
        run: |
          # PR 타겟 브랜치는 GitLab MR로 업데이트 (sync 제외)
          SKIP_BRANCHES="main dev frontend backend ai embedded infra"

          for branch in $(git branch -r | grep 'origin/' | grep -v 'HEAD' | sed 's|origin/||'); do
            SKIP=false
            for skip in $SKIP_BRANCHES; do
              if [ "$branch" = "$skip" ]; then
                SKIP=true
                break
              fi
            done
            if [ "$SKIP" = "true" ]; then
              echo "Skipping $branch (updated via GitLab MR)"
              continue
            fi
            echo "Pushing $branch..."
            git push -f gitlab "refs/remotes/origin/${branch}:refs/heads/${branch}"
          done
          git push -f --tags gitlab;
          git push -f gitlab refs/remotes/origin/main:refs/heads/master || true;
