name: Notify Mattermost on PR

on:
  pull_request:
    types: [opened, closed]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Mattermost notification
        env:
          WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          PR_ACTION="${{ github.event.action }}"
          PR_MERGED="${{ github.event.pull_request.merged }}"
          TARGET_BRANCH="${{ github.event.pull_request.base.ref }}"
          SOURCE_BRANCH="${{ github.event.pull_request.head.ref }}"

          if [ "$PR_ACTION" = "opened" ]; then
            EMOJI=":arrow_right:"
            STATUS="새 PR이 올라왔습니다"
          elif [ "$PR_ACTION" = "closed" ] && [ "$PR_MERGED" = "true" ]; then
            EMOJI=":white_check_mark:"
            STATUS="PR이 머지되었습니다"
          elif [ "$PR_ACTION" = "closed" ]; then
            EMOJI=":x:"
            STATUS="PR이 닫혔습니다"
          fi

          PAYLOAD=$(jq -n \
            --arg text "### ${EMOJI} ${STATUS}
          **[#${PR_NUMBER} ${PR_TITLE}](${PR_URL})**
          | 항목 | 내용 |
          |---|---|
          | 작성자 | ${PR_AUTHOR} |
          | 브랜치 | \`${SOURCE_BRANCH}\` → \`${TARGET_BRANCH}\` |" \
            '{text: $text}')

          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$WEBHOOK_URL"

          echo "Mattermost notification sent"
