name: Notify Mattermost on PR

on:
  pull_request:
    types: [opened, closed]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Mattermost notification
        env:
          WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          MERGED_BY="${{ github.event.pull_request.merged_by.login }}"
          PR_ACTION="${{ github.event.action }}"
          PR_MERGED="${{ github.event.pull_request.merged }}"
          TARGET_BRANCH="${{ github.event.pull_request.base.ref }}"
          SOURCE_BRANCH="${{ github.event.pull_request.head.ref }}"

          # GitHub ID → 한국이름(@mmID) 매핑
          get_display_name() {
            case "$1" in
              "ChaeMok") echo "이채목(@lcm9211)" ;;
              "KSY") echo "김상연(@iscss123)" ;;
              "1421176") echo "진현제(@mkhggh)" ;;
              "smoothie-99") echo "임보경(@l-elizabeth99)" ;;
              "qhrudlim") echo "강한솔(@kanghansol9266)" ;;
              *) echo "$1" ;;
            esac
          }

          AUTHOR_DISPLAY=$(get_display_name "$PR_AUTHOR")
          MERGER_DISPLAY=$(get_display_name "$MERGED_BY")

          if [ "$PR_ACTION" = "opened" ]; then
            EMOJI=":arrow_right:"
            STATUS="새 PR이 올라왔습니다"
          elif [ "$PR_ACTION" = "closed" ] && [ "$PR_MERGED" = "true" ]; then
            EMOJI=":white_check_mark:"
            STATUS="PR이 머지되었습니다"
          elif [ "$PR_ACTION" = "closed" ]; then
            EMOJI=":x:"
            STATUS="PR이 닫혔습니다"
          fi

          # 머지 알림일 때 머지한 사람 표시
          if [ "$PR_ACTION" = "closed" ] && [ "$PR_MERGED" = "true" ]; then
            TABLE="| 항목 | 내용 |
          |---|---|
          | 작성자 | ${AUTHOR_DISPLAY} |
          | 머지한 사람 | ${MERGER_DISPLAY} |
          | 브랜치 | \`${SOURCE_BRANCH}\` → \`${TARGET_BRANCH}\` |"
          else
            TABLE="| 항목 | 내용 |
          |---|---|
          | 작성자 | ${AUTHOR_DISPLAY} |
          | 브랜치 | \`${SOURCE_BRANCH}\` → \`${TARGET_BRANCH}\` |"
          fi

          PAYLOAD=$(jq -n \
            --arg text "### ${EMOJI} ${STATUS}
          **[#${PR_NUMBER} ${PR_TITLE}](${PR_URL})**
          ${TABLE}" \
            '{text: $text}')

          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$WEBHOOK_URL"

          echo "Mattermost notification sent"
