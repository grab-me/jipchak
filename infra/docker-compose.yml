version: '3.8'
services:
  # 1. Database (MySQL)
  db-jipchak:
    image: mysql:8.0
    container_name: db-jipchak
    environment:
      MYSQL_DATABASE: jipchak_db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    env_file:
      - .env
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # 2. Redis
  redis-jipchak:
    image: redis:latest
    container_name: redis-jipchak

  # 3. Jenkins (CI/CD 도구)
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    env_file:
      - .env
    volumes:
      - ./jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

  # 4. Nginx (Reverse Proxy)
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ../nginx/conf.d:/etc/nginx/conf.d
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ../frontend/react/dist:/usr/share/nginx/html:ro
    depends_on:
      - app-jipchak

  # 5. Spring Boot
  app-jipchak:
    build:
      context: ../backend
      dockerfile: ../infra/Dockerfile
    container_name: app-jipchak
    restart: on-failure
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
    env_file:
      - .env
    depends_on:
      db-jipchak:
        condition: service_healthy
      redis-jipchak:
        condition: service_started
